name: Codex Jira Dispatch

on:
  workflow_dispatch:
    inputs:
      issueKey:
        description: Jira issue key
        required: true
        type: string
      summary:
        description: Jira issue summary
        required: true
        type: string
      description:
        description: Jira issue description
        required: true
        type: string
      status:
        description: Jira issue status
        required: true
        type: string
      assignee:
        description: Jira assignee
        required: true
        type: string
      issueUrl:
        description: Jira issue URL
        required: true
        type: string

permissions:
  contents: read

jobs:
  codex-generate:
    runs-on: codex-frontend-azure-aks
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      branch_name: ${{ steps.codex.outputs.branch_name }}
      has_changes: ${{ steps.codex.outputs.has_changes }}
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      ISSUE_KEY: ${{ inputs.issueKey }}
      ISSUE_SUMMARY: ${{ inputs.summary }}
      ISSUE_DESCRIPTION: ${{ inputs.description }}
      ISSUE_STATUS: ${{ inputs.status }}
      ISSUE_ASSIGNEE: ${{ inputs.assignee }}
      ISSUE_URL: ${{ inputs.issueUrl }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify runner toolchain and Codex auth
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./.github/scripts/codex-runner-preflight.sh

      - name: Run Codex and create patch artifact
        id: codex
        env:
          OUTPUT_DIR: ${{ runner.temp }}/codex-output
        run: ./.github/scripts/codex-jira-implement.sh

      - name: Upload Codex output
        uses: actions/upload-artifact@v4
        with:
          name: codex-jira-output
          path: ${{ runner.temp }}/codex-output
          if-no-files-found: error
          retention-days: 1

  publish-pr:
    needs: [codex-generate, verify-codex-output]
    if: needs.codex-generate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      ISSUE_KEY: ${{ inputs.issueKey }}
      ISSUE_SUMMARY: ${{ inputs.summary }}
      ISSUE_URL: ${{ inputs.issueUrl }}
      GH_TOKEN: ${{ github.token }}
      EXPECTED_BRANCH_NAME: ${{ needs.codex-generate.outputs.branch_name }}
      CODEX_JIRA_PR_NOTIFY_URL: ${{ secrets.CODEX_JIRA_PR_NOTIFY_URL }}
      CODEX_JIRA_PR_NOTIFY_TIMEOUT_SECONDS: ${{ vars.CODEX_JIRA_PR_NOTIFY_TIMEOUT_SECONDS || '10' }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download Codex output
        uses: actions/download-artifact@v4
        with:
          name: codex-jira-output
          path: ${{ runner.temp }}/codex-output

      - name: Download verified Codex output
        uses: actions/download-artifact@v4
        with:
          name: codex-jira-verified
          path: ${{ runner.temp }}/codex-verified

      - name: Copy trusted publish script
        run: |
          cp .github/scripts/codex-jira-publish.sh "$RUNNER_TEMP/codex-jira-publish.sh"
          chmod +x "$RUNNER_TEMP/codex-jira-publish.sh"

      - name: Publish pull request and notify Jira
        id: publish
        env:
          OUTPUT_DIR: ${{ runner.temp }}/codex-output
          VERIFICATION_DIR: ${{ runner.temp }}/codex-verified
        run: '$RUNNER_TEMP/codex-jira-publish.sh'

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Codex Jira Dispatch"
            echo
            echo "- Issue: [$ISSUE_KEY]($ISSUE_URL)"
            echo "- Branch: ${{ steps.publish.outputs.branch_name }}"
            echo "- Pull request: ${{ steps.publish.outputs.pr_url }}"
          } >>"$GITHUB_STEP_SUMMARY"

  verify-codex-output:
    needs: codex-generate
    if: needs.codex-generate.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      EXPECTED_BRANCH_NAME: ${{ needs.codex-generate.outputs.branch_name }}
      GH_TOKEN: ${{ github.token }}
      LOCAL_PIPELINE_MODE: checks-only

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Download Codex output
        uses: actions/download-artifact@v4
        with:
          name: codex-jira-output
          path: ${{ runner.temp }}/codex-output

      - name: Verify Codex patch
        id: verify
        env:
          OUTPUT_DIR: ${{ runner.temp }}/codex-output
        run: ./.github/scripts/codex-jira-verify.sh

      - name: Upload verified Codex output
        uses: actions/upload-artifact@v4
        with:
          name: codex-jira-verified
          path: |
            ${{ runner.temp }}/codex-output/codex-pr-body.md
            ${{ runner.temp }}/codex-output/guardrail-changes.txt
            ${{ runner.temp }}/codex-output/verification.env
          if-no-files-found: error
          retention-days: 1
