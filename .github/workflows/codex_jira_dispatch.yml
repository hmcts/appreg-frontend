name: Codex Jira Dispatch

on:
  workflow_dispatch:
    inputs:
      issueKey:
        description: Jira issue key
        required: true
        type: string
      summary:
        description: Jira issue summary
        required: true
        type: string
      description:
        description: Jira issue description
        required: true
        type: string
      status:
        description: Jira issue status
        required: true
        type: string
      assignee:
        description: Jira assignee
        required: true
        type: string
      issueUrl:
        description: Jira issue URL
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  codex-dispatch:
    runs-on: codex-frontend-azure-aks
    timeout-minutes: 120
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      ISSUE_KEY: ${{ inputs.issueKey }}
      ISSUE_SUMMARY: ${{ inputs.summary }}
      ISSUE_DESCRIPTION: ${{ inputs.description }}
      ISSUE_STATUS: ${{ inputs.status }}
      ISSUE_ASSIGNEE: ${{ inputs.assignee }}
      ISSUE_URL: ${{ inputs.issueUrl }}
      GH_TOKEN: ${{ github.token }}
      CODEX_JIRA_PR_NOTIFY_URL: ${{ secrets.CODEX_JIRA_PR_NOTIFY_URL }}
      CODEX_JIRA_PR_NOTIFY_TIMEOUT_SECONDS: ${{ vars.CODEX_JIRA_PR_NOTIFY_TIMEOUT_SECONDS || '10' }}

    steps:
      - name: Checkout default branch
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --local credential.helper \
            '!f() { test "$1" = get && echo username=x-access-token && echo "password=$GH_TOKEN"; }; f'
          git fetch --prune --no-tags origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" FETCH_HEAD

      - name: Verify runner toolchain and Codex auth
        run: ./.github/scripts/codex-runner-preflight.sh

      - name: Run Codex and open pull request
        id: codex
        env:
          PAYLOAD_PATH: ${{ runner.temp }}/jira-ticket.json
          PROMPT_PATH: ${{ runner.temp }}/codex-prompt.md
          PR_BODY_PATH: ${{ runner.temp }}/codex-pr-body.md
        run: ./.github/scripts/codex-jira-implement.sh

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Codex Jira Dispatch"
            echo
            echo "- Issue: [$ISSUE_KEY]($ISSUE_URL)"
            echo "- Payload file: runner temp directory only"
            echo "- Branch: ${{ steps.codex.outputs.branch_name }}"
            echo "- Pull request: ${{ steps.codex.outputs.pr_url }}"
          } >>"$GITHUB_STEP_SUMMARY"
