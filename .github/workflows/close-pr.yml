name: PR Tasks

on:
  pull_request:
    types: [closed]

permissions:
  id-token: write
  contents: read

jobs:
  remove-redirect-uris:
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets are present
        run: |
          test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "Missing AZURE_CLIENT_ID" && exit 1)
          test -n "${{ secrets.AZURE_CLIENT_SECRET }}" || (echo "Missing AZURE_CLIENT_SECRET" && exit 1)
          test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "Missing AZURE_TENANT_ID" && exit 1)

      - name: Azure Login
        run: |
          az login --service-principal \
            --username "${{ secrets.AZURE_CLIENT_ID }}" \
            --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
            --tenant "${{ secrets.AZURE_TENANT_ID }}" \
            --allow-no-subscriptions

      - name: Remove redirect URIs for PR environment
        env:
          PR_NUMBER: ${{ github.event.number }}
          TARGET_APP_NAME: appreg-stg
        run: |
          set -euo pipefail

          BASE_URL="https://appreg-frontend-pr-${PR_NUMBER}.dev.platform.hmcts.net"
          BASE_URL="${BASE_URL%/}"

          LOGIN_CB="${BASE_URL}/sso/login-callback"
          LOGOUT_CB="${BASE_URL}/sso/logout-callback"

          objectId="$(az ad app list \
            --all \
            --filter "displayName eq '${TARGET_APP_NAME}'" \
            --query "[0].id" -o tsv --only-show-errors)"

          objectId="$(echo -n "$objectId" | tr -d '\r\n\t ')"

          if [ -z "$objectId" ]; then
            echo "Could not resolve objectId for displayName='${TARGET_APP_NAME}'"
            exit 1
          fi

          echo "Resolved objectId: ${objectId}"

          CURRENT="$(az rest \
            --method GET \
            --url "https://graph.microsoft.com/v1.0/applications/${objectId}" \
            --query "web.redirectUris" -o json --only-show-errors)"

          if [ "$CURRENT" = "null" ] || [ -z "$CURRENT" ]; then
            CURRENT="[]"
          fi

          if ! echo "$CURRENT" | jq -e . >/dev/null 2>&1; then
            echo "$CURRENT" | head -c 1000 >&2 || true
            exit 3
          fi

          UPDATED="$CURRENT"
          removed=0

          if echo "$UPDATED" | jq -e --arg url "$LOGIN_CB" 'any(. == $url)' >/dev/null; then
            UPDATED=$(echo "$UPDATED" | jq --arg url "$LOGIN_CB" 'map(select(. != $url))')
            removed=1
          fi

          if echo "$UPDATED" | jq -e --arg url "$LOGOUT_CB" 'any(. == $url)' >/dev/null; then
            UPDATED=$(echo "$UPDATED" | jq --arg url "$LOGOUT_CB" 'map(select(. != $url))')
            removed=1
          fi

          if [ "$removed" -eq 0 ]; then
            echo "NO_CHANGES"
            exit 0
          fi

          BODY=$(jq -cn --argjson uris "$UPDATED" '{web:{redirectUris:$uris}}')

          az rest \
            --method PATCH \
            --url "https://graph.microsoft.com/v1.0/applications/${objectId}" \
            --headers "Content-Type=application/json" \
            --body "$BODY" \
            -o none --only-show-errors

          echo "CHANGED"
