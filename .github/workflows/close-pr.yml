name: PR Tasks

on:
  pull_request:
    types: [closed]

permissions:
  id-token: write
  contents: read

jobs:
  remove-redirect-uris:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login
        run: |
          az login --service-principal \
            --username "${{ secrets.SP_CLIENT_ID }}" \
            --password "${{ secrets.SP_SECRET_KEY }}" \
            --tenant "${{ secrets.SP_TENANT_ID }}" \
            --allow-no-subscriptions

      - name: Remove redirect URIs for PR environment
        env:
          PR_NUMBER: ${{ github.event.number }}
          OBJECT_ID: ${{ secrets.APPREG_OBJECT_ID }}
        run: |
          set -euo pipefail

          BASE_URL="https://appreg-frontend-pr-${PR_NUMBER}.dev.platform.hmcts.net"
          BASE_URL="${BASE_URL%/}"

          LOGIN_CB="${BASE_URL}/sso/login-callback"
          LOGOUT_CB="${BASE_URL}/sso/logout-callback"

          CURRENT="$(az rest \
            --method GET \
            --url "https://graph.microsoft.com/v1.0/applications/${OBJECT_ID}" \
            --query "web.redirectUris" -o json --only-show-errors)"

          if [ "$CURRENT" = "null" ] || [ -z "$CURRENT" ]; then
            CURRENT="[]"
          fi

          if ! echo "$CURRENT" | jq -e . >/dev/null 2>&1; then
            echo "$CURRENT" | head -c 1000 >&2 || true
            exit 3
          fi

          UPDATED="$CURRENT"
          removed=0

          if echo "$UPDATED" | jq -e --arg url "$LOGIN_CB" 'any(. == $url)' >/dev/null; then
            UPDATED=$(echo "$UPDATED" | jq --arg url "$LOGIN_CB" 'map(select(. != $url))')
            removed=1
          fi

          if echo "$UPDATED" | jq -e --arg url "$LOGOUT_CB" 'any(. == $url)' >/dev/null; then
            UPDATED=$(echo "$UPDATED" | jq --arg url "$LOGOUT_CB" 'map(select(. != $url))')
            removed=1
          fi

          if [ "$removed" -eq 0 ]; then
            echo "NO_CHANGES"
            exit 0
          fi

          BODY=$(jq -cn --argjson uris "$UPDATED" '{web:{redirectUris:$uris}}')

          az rest \
            --method PATCH \
            --url "https://graph.microsoft.com/v1.0/applications/${OBJECT_ID}" \
            --headers "Content-Type=application/json" \
            --body "$BODY" \
            -o none --only-show-errors

          echo "CHANGED"
