name: Codex PR Review Feedback

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  detect-codex-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      is_codex_pr: ${{ steps.detect.outputs.is_codex_pr }}
      pr_number: ${{ steps.detect.outputs.pr_number }}
      head_ref: ${{ steps.detect.outputs.head_ref }}
    steps:
      - name: Detect Codex PR
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_number=""
          head_ref=""
          body=""
          actor_login=""
          actor_permission=""
          review_state=""

          write_skip() {
            local reason="$1"
            echo "Skipping Codex review feedback: ${reason}"
            {
              echo "is_codex_pr=false"
              echo "pr_number=${pr_number}"
              echo "head_ref=${head_ref}"
            } >>"$GITHUB_OUTPUT"
          }

          case "$GITHUB_EVENT_NAME" in
            pull_request_review|pull_request_review_comment)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              head_ref="$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")"
              if [[ "$GITHUB_EVENT_NAME" == "pull_request_review" ]]; then
                body="$(jq -r '.review.body // ""' "$GITHUB_EVENT_PATH")"
                actor_login="$(jq -r '.review.user.login // ""' "$GITHUB_EVENT_PATH")"
                review_state="$(jq -r '.review.state // ""' "$GITHUB_EVENT_PATH")"
              else
                body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
                actor_login="$(jq -r '.comment.user.login // ""' "$GITHUB_EVENT_PATH")"
              fi
              ;;
            issue_comment)
              is_pr="$(jq -r '.issue | has("pull_request")' "$GITHUB_EVENT_PATH")"
              if [[ "$is_pr" != "true" ]]; then
                write_skip "comment is not on a pull request"
                exit 0
              fi
              pr_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
              head_ref="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '.head.ref')"
              body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
              actor_login="$(jq -r '.comment.user.login // ""' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              write_skip "unsupported event: ${GITHUB_EVENT_NAME}"
              exit 0
              ;;
          esac

          if [[ "$head_ref" != codex/* ]]; then
            write_skip "PR branch ${head_ref} is not a Codex branch"
            exit 0
          fi

          if [[ "$review_state" == "approved" ]]; then
            write_skip "review was approved"
            exit 0
          fi

          if ! grep -Eiq '(^|[[:space:]])/(codex-review|codex review)([[:space:]]|$)' <<<"$body"; then
            write_skip "missing explicit /codex-review command"
            exit 0
          fi

          if [[ -z "$actor_login" || "$actor_login" == "null" ]]; then
            write_skip "comment author could not be determined"
            exit 0
          fi

          case "$actor_login" in
            github-actions[bot]|app/github-actions)
              write_skip "ignoring GitHub Actions bot comment"
              exit 0
              ;;
          esac

          actor_permission="$(
            gh api "repos/${GITHUB_REPOSITORY}/collaborators/${actor_login}/permission" \
              --jq '.permission' 2>/dev/null || true
          )"

          case "$actor_permission" in
            write|maintain|admin)
              ;;
            *)
              write_skip "actor ${actor_login} does not have repository write permission"
              exit 0
              ;;
          esac

          {
            echo "is_codex_pr=true"
            echo "pr_number=${pr_number}"
            echo "head_ref=${head_ref}"
          } >>"$GITHUB_OUTPUT"

  codex-review-feedback:
    needs: detect-codex-pr
    if: needs.detect-codex-pr.outputs.is_codex_pr == 'true'
    runs-on: codex-frontend-azure-aks
    permissions:
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 120
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout default branch
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --local credential.helper \
            '!f() { test "$1" = get && echo username=x-access-token && echo "password=$GH_TOKEN"; }; f'
          git fetch --prune --no-tags origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" FETCH_HEAD

      - name: Verify runner toolchain and Codex auth
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./.github/scripts/codex-runner-preflight.sh

      - name: Run Codex on review feedback
        id: codex
        env:
          PROMPT_PATH: ${{ runner.temp }}/codex-review-feedback-prompt.md
        run: ./.github/scripts/codex-pr-review-feedback.sh

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Codex PR Review Feedback"
            echo
            echo "- Event: $GITHUB_EVENT_NAME"
            echo "- Pull request: ${{ steps.codex.outputs.pr_number }}"
            echo "- Branch: ${{ steps.codex.outputs.branch_name }}"
            echo "- Commit: ${{ steps.codex.outputs.commit_sha }}"
          } >>"$GITHUB_STEP_SUMMARY"
