name: Codex PR Review Feedback

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  detect-codex-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
    outputs:
      is_codex_pr: ${{ steps.detect.outputs.is_codex_pr }}
      pr_number: ${{ steps.detect.outputs.pr_number }}
      head_ref: ${{ steps.detect.outputs.head_ref }}
    steps:
      - name: Detect Codex PR
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_number=""
          head_ref=""
          head_repo=""
          body=""
          actor_login=""
          actor_permission=""
          review_state=""

          write_skip() {
            local reason="$1"
            echo "Skipping Codex review feedback: ${reason}"
            {
              echo "is_codex_pr=false"
              echo "pr_number=${pr_number}"
              echo "head_ref=${head_ref}"
            } >>"$GITHUB_OUTPUT"
          }

          case "$GITHUB_EVENT_NAME" in
            pull_request_review|pull_request_review_comment)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              head_ref="$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")"
              head_repo="$(jq -r '.pull_request.head.repo.full_name' "$GITHUB_EVENT_PATH")"
              if [[ "$GITHUB_EVENT_NAME" == "pull_request_review" ]]; then
                body="$(jq -r '.review.body // ""' "$GITHUB_EVENT_PATH")"
                actor_login="$(jq -r '.review.user.login // ""' "$GITHUB_EVENT_PATH")"
                review_state="$(jq -r '.review.state // ""' "$GITHUB_EVENT_PATH")"
              else
                body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
                actor_login="$(jq -r '.comment.user.login // ""' "$GITHUB_EVENT_PATH")"
              fi
              ;;
            issue_comment)
              is_pr="$(jq -r '.issue | has("pull_request")' "$GITHUB_EVENT_PATH")"
              if [[ "$is_pr" != "true" ]]; then
                write_skip "comment is not on a pull request"
                exit 0
              fi
              pr_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
              pull_request_json="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}")"
              head_ref="$(jq -r '.head.ref' <<<"${pull_request_json}")"
              head_repo="$(jq -r '.head.repo.full_name' <<<"${pull_request_json}")"
              body="$(jq -r '.comment.body // ""' "$GITHUB_EVENT_PATH")"
              actor_login="$(jq -r '.comment.user.login // ""' "$GITHUB_EVENT_PATH")"
              ;;
            *)
              write_skip "unsupported event: ${GITHUB_EVENT_NAME}"
              exit 0
              ;;
          esac

          if [[ "$head_ref" != codex/* ]]; then
            write_skip "PR branch ${head_ref} is not a Codex branch"
            exit 0
          fi

          if [[ "$head_repo" != "$GITHUB_REPOSITORY" ]]; then
            write_skip "PR head repo ${head_repo} is not ${GITHUB_REPOSITORY}"
            exit 0
          fi

          if [[ "$review_state" == "approved" ]]; then
            write_skip "review was approved"
            exit 0
          fi

          if ! grep -Eiq '(^|[[:space:]])/(codex-review|codex review)([[:space:]]|$)' <<<"$body"; then
            write_skip "missing explicit /codex-review command"
            exit 0
          fi

          if [[ -z "$actor_login" || "$actor_login" == "null" ]]; then
            write_skip "comment author could not be determined"
            exit 0
          fi

          case "$actor_login" in
            github-actions[bot]|app/github-actions)
              write_skip "ignoring GitHub Actions bot comment"
              exit 0
              ;;
          esac

          actor_permission="$(
            gh api "repos/${GITHUB_REPOSITORY}/collaborators/${actor_login}/permission" \
              --jq '.permission' 2>/dev/null || true
          )"

          case "$actor_permission" in
            write|maintain|admin)
              ;;
            *)
              write_skip "actor ${actor_login} does not have repository write permission"
              exit 0
              ;;
          esac

          {
            echo "is_codex_pr=true"
            echo "pr_number=${pr_number}"
            echo "head_ref=${head_ref}"
          } >>"$GITHUB_OUTPUT"

  codex-review-generate:
    needs: detect-codex-pr
    if: needs.detect-codex-pr.outputs.is_codex_pr == 'true'
    runs-on: codex-frontend-azure-aks
    permissions:
      contents: read
      pull-requests: read
      issues: read
    timeout-minutes: 120
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify runner toolchain and Codex auth
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./.github/scripts/codex-runner-preflight.sh

      - name: Run Codex on review feedback and create patch artifact
        id: codex
        env:
          OUTPUT_DIR: ${{ runner.temp }}/codex-output
        run: ./.github/scripts/codex-pr-review-feedback.sh

      - name: Upload Codex review output
        uses: actions/upload-artifact@v4
        with:
          name: codex-review-output
          path: ${{ runner.temp }}/codex-output
          if-no-files-found: error
          retention-days: 1

  codex-review-verify:
    needs: [detect-codex-pr, codex-review-generate]
    if: needs.detect-codex-pr.outputs.is_codex_pr == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 30
    outputs:
      passed: ${{ steps.verify.outputs.passed }}
      output_artifact: codex-review-output
      verified_artifact: codex-review-verified-0
      failure_artifact: codex-review-verification-failure-0
    env:
      EXPECTED_PR_NUMBER: ${{ needs.detect-codex-pr.outputs.pr_number }}
      EXPECTED_HEAD_REF: ${{ needs.detect-codex-pr.outputs.head_ref }}
      GH_TOKEN: ${{ github.token }}
      LOCAL_PIPELINE_MODE: fast
      FRONTEND_FAST_COMMAND: yarn cichecks
      CODEX_OUTPUT_ARTIFACT: codex-review-output
      CODEX_VERIFIED_ARTIFACT: codex-review-verified-0
      CODEX_FAILURE_ARTIFACT: codex-review-verification-failure-0

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      - name: Download Codex review output
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CODEX_OUTPUT_ARTIFACT }}
          path: ${{ runner.temp }}/codex-output

      - name: Verify Codex review patch
        id: verify
        env:
          OUTPUT_DIR: ${{ runner.temp }}/codex-output
        run: |
          set +e
          ./.github/scripts/codex-pr-review-verify.sh >"$RUNNER_TEMP/codex-review-verification.log" 2>&1
          status=$?
          cat "$RUNNER_TEMP/codex-review-verification.log"
          if [[ "${status}" -eq 0 ]]; then
            echo "passed=true" >>"$GITHUB_OUTPUT"
          else
            mkdir -p "$RUNNER_TEMP/codex-review-verification-failure"
            cp "$RUNNER_TEMP/codex-review-verification.log" "$RUNNER_TEMP/codex-review-verification-failure/verification-failure.log"
            tail -n 240 "$RUNNER_TEMP/codex-review-verification.log" >"$RUNNER_TEMP/codex-review-verification-failure/verification-failure-summary.log"
            echo "passed=false" >>"$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Upload verified Codex review output
        if: steps.verify.outputs.passed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CODEX_VERIFIED_ARTIFACT }}
          path: |
            ${{ runner.temp }}/codex-output/changes.patch
            ${{ runner.temp }}/codex-output/codex-review-comment.md
            ${{ runner.temp }}/codex-output/guardrail-changes.txt
            ${{ runner.temp }}/codex-output/verification.env
          if-no-files-found: error
          retention-days: 1

      - name: Upload review verification failure
        if: steps.verify.outputs.passed != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CODEX_FAILURE_ARTIFACT }}
          path: ${{ runner.temp }}/codex-review-verification-failure
          if-no-files-found: error
          retention-days: 1

  codex-review-repair-1:
    needs: [detect-codex-pr, codex-review-generate, codex-review-verify]
    if: needs.detect-codex-pr.outputs.is_codex_pr == 'true' && needs.codex-review-verify.outputs.passed != 'true'
    runs-on: codex-frontend-azure-aks
    permissions:
      contents: read
      pull-requests: read
      issues: read
    timeout-minutes: 120
    outputs:
      has_changes: ${{ steps.repair.outputs.has_changes }}
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GH_TOKEN: ${{ github.token }}
      REPAIR_ATTEMPT: '1'
      MAX_CODEX_REPAIR_ATTEMPTS: '3'
      CODEX_INPUT_ARTIFACT: ${{ needs.codex-review-verify.outputs.output_artifact }}
      CODEX_FAILURE_ARTIFACT: ${{ needs.codex-review-verify.outputs.failure_artifact }}
      CODEX_OUTPUT_ARTIFACT: codex-review-output-repair-1

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v5
        with:
          ref: ${{ env.DEFAULT_BRANCH }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify runner toolchain and Codex auth
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: ./.github/scripts/codex-runner-preflight.sh

      - name: Download Codex review output to repair
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CODEX_INPUT_ARTIFACT }}
          path: ${{ runner.temp }}/codex-input

      - name: Download review verification failure
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.CODEX_FAILURE_ARTIFACT }}
          path: ${{ runner.temp }}/codex-failure

      - name: Repair Codex review patch
        id: repair
        env:
          INPUT_DIR: ${{ runner.temp }}/codex-input
          FAILURE_DIR: ${{ runner.temp }}/codex-failure
          OUTPUT_DIR: ${{ runner.temp }}/codex-output
        run: ./.github/scripts/codex-pr-review-repair.sh

      - name: Upload repaired Codex review output
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CODEX_OUTPUT_ARTIFACT }}
          path: ${{ runner.temp }}/codex-output
          if-no-files-found: error
          retention-days: 1

  codex-review-verify-1:
