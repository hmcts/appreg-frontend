name: Codex PR Review Feedback

on:
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  detect-codex-pr:
    runs-on: ubuntu-latest
    outputs:
      is_codex_pr: ${{ steps.detect.outputs.is_codex_pr }}
      pr_number: ${{ steps.detect.outputs.pr_number }}
      head_ref: ${{ steps.detect.outputs.head_ref }}
    steps:
      - name: Detect Codex PR
        id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_number=""
          head_ref=""

          case "$GITHUB_EVENT_NAME" in
            pull_request_review|pull_request_review_comment)
              pr_number="$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")"
              head_ref="$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")"
              ;;
            issue_comment)
              is_pr="$(jq -r '.issue | has("pull_request")' "$GITHUB_EVENT_PATH")"
              if [[ "$is_pr" != "true" ]]; then
                {
                  echo "is_codex_pr=false"
                  echo "pr_number="
                  echo "head_ref="
                } >>"$GITHUB_OUTPUT"
                exit 0
              fi
              pr_number="$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")"
              head_ref="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" --jq '.head.ref')"
              ;;
            *)
              {
                echo "is_codex_pr=false"
                echo "pr_number="
                echo "head_ref="
              } >>"$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          if [[ "$head_ref" == codex/* ]]; then
            is_codex_pr="true"
          else
            is_codex_pr="false"
          fi

          {
            echo "is_codex_pr=${is_codex_pr}"
            echo "pr_number=${pr_number}"
            echo "head_ref=${head_ref}"
          } >>"$GITHUB_OUTPUT"

  codex-review-feedback:
    needs: detect-codex-pr
    if: needs.detect-codex-pr.outputs.is_codex_pr == 'true'
    runs-on: codex-frontend-azure-aks
    timeout-minutes: 120
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GH_TOKEN: ${{ github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout default branch
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git config --local credential.helper \
            '!f() { test "$1" = get && echo username=x-access-token && echo "password=$GH_TOKEN"; }; f'
          git fetch --prune --no-tags origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" FETCH_HEAD

      - name: Verify runner toolchain and Codex auth
        run: ./.github/scripts/codex-runner-preflight.sh

      - name: Run Codex on review feedback
        id: codex
        env:
          PROMPT_PATH: ${{ runner.temp }}/codex-review-feedback-prompt.md
        run: ./.github/scripts/codex-pr-review-feedback.sh

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## Codex PR Review Feedback"
            echo
            echo "- Event: $GITHUB_EVENT_NAME"
            echo "- Pull request: ${{ steps.codex.outputs.pr_number }}"
            echo "- Branch: ${{ steps.codex.outputs.branch_name }}"
            echo "- Commit: ${{ steps.codex.outputs.commit_sha }}"
          } >>"$GITHUB_STEP_SUMMARY"
