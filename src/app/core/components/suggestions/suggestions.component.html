<div [class]="containerWidthClass()">
  <div
    class="govuk-form-group"
    [ngClass]="{ 'govuk-form-group--error': showError() }"
  >
    <div class="govuk-label-wrapper">
      <label class="govuk-label" [for]="id()">{{ label() }}</label>
    </div>

    @if (hint()) {
      <div [id]="id() + '-hint'" class="govuk-hint">{{ hint() }}</div>
    }

    @if (showError()) {
      <p [id]="id() + '-error'" class="govuk-error-message">
        <span class="govuk-visually-hidden">Error:</span> {{ errorText() }}
      </p>
    }

    <div class="app-autocomplete">
      <input
        class="govuk-input"
        [ngClass]="[widthClass(), showError() ? 'govuk-input--error' : '']"
        [id]="id()"
        [name]="id()"
        type="text"
        [disabled]="disabledState()"
        [value]="searchState()"
        (focus)="onFocus()"
        (click)="onClick()"
        (keydown)="onKeydown($event)"
        (blur)="onBlur()"
        (input)="onNativeInput($event)"
        [attr.aria-describedby]="
          (hint() ? id() + '-hint ' : '') + (showError() ? id() + '-error' : '')
        "
        autocomplete="off"
      />

      @if (popupVisible) {
        <ul [id]="listboxId" class="govuk-list app-autocomplete__menu">
          @if (open) {
            @for (item of visibleSuggestions; track item) {
              <li>
                <button
                  type="button"
                  class="app-autocomplete__link"
                  (mousedown)="choose(item, $event)"
                >
                  {{ labelFor(item) }}
                </button>
              </li>
            }
          } @else {
            <li>
              <span
                [id]="statusId"
                class="app-autocomplete__link"
                aria-live="polite"
              >
                No results found
              </span>
            </li>
          }
        </ul>
      }
    </div>
  </div>
</div>
