<div class="moj-search">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="govuk-form-group">
      <label
        class="govuk-label moj-search__label govuk-!-font-weight-bold"
        [attr.for]="computedId"
      >
        {{ label() }}
      </label>

      @if (hint()) {
        <div [id]="hintId" class="govuk-hint moj-search__hint">
          {{ hint() }}
        </div>
      }

      <input
        class="govuk-input moj-search__input"
        [id]="computedId"
        [attr.name]="name()"
        type="search"
        [attr.placeholder]="placeholder() || null"
        [attr.aria-describedby]="ariaDescribedByAttr"
        formControlName="search"
      />
    </div>

    <button
      type="submit"
      class="govuk-button moj-search__button"
      data-module="govuk-button"
    >
      {{ buttonText() }}
    </button>
  </form>
</div>
