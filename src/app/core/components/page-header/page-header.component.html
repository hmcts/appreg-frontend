<div class="moj-page-header-actions">
  <div class="moj-page-header-actions__title">
    <h1 [ngClass]="headingClass">{{ title }}</h1>
  </div>

  <div class="moj-page-header-actions__actions">
    <div class="moj-button-group moj-button-group--inline">
      @for (a of actions; track a.id ?? a.label) {
        @if (a.routerLink) {
          <a
            class="govuk-button"
            [class.govuk-button--start]="a.startIcon"
            [class.govuk-button--secondary]="isSecondary(a)"
            [class.govuk-button--warning]="isWarning(a)"
            [routerLink]="a.routerLink"
            [queryParams]="a.queryParams"
            [attr.id]="a.id ?? null"
            [attr.aria-disabled]="a.disabled ? 'true' : null"
            [class.govuk-button--disabled]="a.disabled || null"
            (click)="a.disabled ? $event.preventDefault() : null"
          >
            {{ a.label }}
            @if (a.startIcon) {
              <svg
                class="govuk-button__start-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="17.5"
                height="19"
                viewBox="0 0 33 40"
                aria-hidden="true"
                focusable="false"
              >
                <path fill="currentColor" d="M0 0h13l20 20-20 20H0l20-20z" />
              </svg>
            }
          </a>
        } @else if (a.href) {
          <a
            class="govuk-button"
            [class.govuk-button--start]="a.startIcon"
            [class.govuk-button--secondary]="isSecondary(a)"
            [class.govuk-button--warning]="isWarning(a)"
            [href]="a.href"
            [attr.id]="a.id ?? null"
            [attr.aria-disabled]="a.disabled ? 'true' : null"
            [class.govuk-button--disabled]="a.disabled || null"
            (click)="a.disabled ? $event.preventDefault() : null"
          >
            {{ a.label }}
            @if (a.startIcon) {
              <svg
                class="govuk-button__start-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="17.5"
                height="19"
                viewBox="0 0 33 40"
                aria-hidden="true"
                focusable="false"
              >
                <path fill="currentColor" d="M0 0h13l20 20-20 20H0l20-20z" />
              </svg>
            }
          </a>
        } @else {
          <button
            type="button"
            class="govuk-button"
            [class.govuk-button--start]="a.startIcon"
            [class.govuk-button--secondary]="isSecondary(a)"
            [class.govuk-button--warning]="isWarning(a)"
            [attr.id]="a.id ?? null"
            [disabled]="a.disabled || null"
            (click)="a.onClick?.($event)"
          >
            {{ a.label }}
            @if (a.startIcon) {
              <svg
                class="govuk-button__start-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="17.5"
                height="19"
                viewBox="0 0 33 40"
                aria-hidden="true"
                focusable="false"
              >
                <path fill="currentColor" d="M0 0h13l20 20-20 20H0l20-20z" />
              </svg>
            }
          </button>
        }
      }
    </div>
  </div>
</div>
