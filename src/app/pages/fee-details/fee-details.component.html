<a [routerLink]="['/applications-list', id, 'bulk-upload']" class="govuk-back-link">Back</a>

<h2 class="govuk-heading-l">Fee details</h2>

<table class="govuk-table">
  <thead class="govuk-table__head">
    <tr class="govuk-table__row">
      <th scope="col" class="govuk-table__header">Fee Status</th>
      <th scope="col" class="govuk-table__header">Status Date</th>
      <th scope="col" class="govuk-table__header">Payment Ref</th>
    </tr>
  </thead>
  <tbody class="govuk-table__body">
    <tr class="govuk-table__row">
      <th scope="row" class="govuk-table__header">Paid</th>
      <td class="govuk-table__cell">15/05/2025</td>
      <td class="govuk-table__cell">PMT-2025-000123</td>
    </tr>
  </tbody>
</table>

<hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" />

<h2 class="govuk-heading-l">Add fee details</h2>
<div class="govuk-grid-row">
  <!-- Fee status -->
  <div class="govuk-grid-column-one-quarter">
    <div class="govuk-form-group">
      <label class="govuk-label govuk-label--m" for="fee-status">Fee status</label>
      <div id="fee-status-hint" class="govuk-hint">Select the status of the fee to be paid</div>
      <select
        class="govuk-select govuk-!-width-one-half"
        id="fee-status"
        name="fee-status"
        aria-describedby="fee-status-hint"
      >
        <option value="">Select status</option>
        <option value="paid">Paid</option>
        <option value="outstanding">Outstanding</option>
        <option value="pending">Pending</option>
      </select>
    </div>
  </div>

  <!-- Status date -->
  <div class="govuk-grid-column-one-quarter">
    <div class="govuk-form-group">
      <fieldset class="govuk-fieldset" role="group" aria-describedby="status-date-hint">
        <legend class="govuk-fieldset__legend govuk-fieldset__legend--m">
          <h1 class="govuk-fieldset__heading">Status date</h1>
        </legend>
        <div id="status-date-hint" class="govuk-hint">For example, 15 5 2025</div>
        <div class="govuk-date-input" id="status-date">
          <div class="govuk-date-input__item govuk-!-margin-right-3">
            <div class="govuk-form-group">
              <label class="govuk-label govuk-date-input__label" for="status-day">Day</label>
              <input
                class="govuk-input govuk-date-input__input govuk-input--width-2"
                id="status-day"
                name="status-day"
                type="text"
                inputmode="numeric"
              />
            </div>
          </div>
          <div class="govuk-date-input__item govuk-!-margin-right-3">
            <div class="govuk-form-group">
              <label class="govuk-label govuk-date-input__label" for="status-month">Month</label>
              <input
                class="govuk-input govuk-date-input__input govuk-input--width-2"
                id="status-month"
                name="status-month"
                type="text"
                inputmode="numeric"
              />
            </div>
          </div>
          <div class="govuk-date-input__item">
            <div class="govuk-form-group">
              <label class="govuk-label govuk-date-input__label" for="status-year">Year</label>
              <input
                class="govuk-input govuk-date-input__input govuk-input--width-4"
                id="status-year"
                name="status-year"
                type="text"
                inputmode="numeric"
              />
            </div>
          </div>
        </div>
      </fieldset>
    </div>
  </div>

  <!-- Payment reference -->
  <div class="govuk-grid-column-one-quarter">
    <div class="govuk-form-group">
      <label class="govuk-label govuk-label--m" for="payment-ref">Payment reference</label>
      <div id="payment-ref-hint" class="govuk-hint">Enter the unique reference assigned to this payment</div>
      <input
        class="govuk-input govuk-input--width-10"
        id="payment-ref"
        name="paymentRef"
        type="text"
        aria-describedby="payment-ref-hint"
      />
    </div>
  </div>
</div>

<div class="govuk-button-group">
  <button type="button" class="govuk-button">Save fee details</button>
</div>
