<h1 class="govuk-heading-xl">Applications</h1>

@if (submitted && searchErrors.length) {
  <app-error-summary
    [title]="errorHint || 'There is a problem'"
    [items]="searchErrors"
    targetId="search"
  />
} @else {
  @if (isSearch && !isLoading && !rows.length) {
    <app-notification-banner
      heading="No lists found"
      body="Try different filters, or "
      linkText="create a new list"
      [linkCommands]="['/applications-list/create']"
    >
    </app-notification-banner>
  }
}

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>
<form [formGroup]="form" (ngSubmit)="onSubmit($event)">
  <div class="govuk-grid-row">
    <!-- Date -->
    <app-date-input
      formControlName="date"
      label="Date"
      hint="For example, 27 3 2007"
      idPrefix="date"
      [submitted]="submitted"
      [isSearch]="isSearch"
    >
    </app-date-input>

    <!-- Applicant Org -->
    <app-text-input
      formControlName="applicantOrg"
      label="Applicant Org"
      hint="Enter the applicants organisation"
      idPrefix="description"
    >
    </app-text-input>

    <!-- Respondent Org -->
    <app-text-input
      formControlName="respondentOrg"
      label="Respondent Org"
      hint="Enter the respondents organisation"
      idPrefix="description"
    >
    </app-text-input>

    <!-- Court -->
    <app-suggestions
      id="court"
      label="Court"
      hint="Enter a description of the court"
      [(search)]="state().courthouseSearch"
      (searchChange)="onCourthouseInputChange()"
      [suggestions]="state().filteredCourthouses"
      (selectItem)="selectCourthouse($event)"
      [disabled]="!!form.get('location')?.value || !!form.get('cja')?.value"
    />
  </div>

  <div class="govuk-grid-row">
    <!-- Applicant last name -->
    <app-text-input
      formControlName="applicantSurname"
      label="Applicant surname"
      hint="The applicants last name"
      idPrefix="description"
    >
    </app-text-input>

    <!-- Respondent surname -->
    <app-text-input
      formControlName="respondentSurname"
      label="Respondent surname"
      hint="The respondent last name"
      idPrefix="description"
    >
    </app-text-input>

    <!-- Location Description -->
    <app-text-input
      formControlName="location"
      label="List other location"
      hint="Other location description"
      idPrefix="description"
    >
    </app-text-input>

    <!-- Applicant code -->
    <app-text-input
      formControlName="standardApplicantCode"
      label="Applicant code"
      hint="The standard applicant code"
      idPrefix="description"
    >
    </app-text-input>
  </div>

  <div class="govuk-grid-row">
    <!-- Postcode -->
    <app-text-input
      formControlName="respondentPostcode"
      label="Post code"
      hint="Respondents post code"
      idPrefix="description"
    >
    </app-text-input>

    <!-- CJA -->
    <app-suggestions
      id="cja"
      label="CJA"
      hint="Start typing to search"
      [(search)]="state().cjaSearch"
      (searchChange)="onCjaInputChange()"
      [suggestions]="state().filteredCja"
      (selectItem)="selectCja($event)"
      [disabled]="!!setCourthouseSearch || !!form.get('court')?.value"
    />

    <!-- Status -->
    <app-select-input
      formControlName="status"
      label="Select status"
      hint="Status of the application"
      idPrefix="status"
      [options]="status"
    >
    </app-select-input>

    <!-- Account reference -->
    <app-text-input
      formControlName="accountReference"
      label="Account reference"
      hint="The account reference code"
      idPrefix="description"
    >
    </app-text-input>
  </div>

  <div class="govuk-button-group">
    <button
      id="search"
      type="submit"
      class="govuk-button"
      value="search"
      [disabled]="searchDisabled"
    >
      Search
    </button>
  </div>
</form>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>

@if (rows.length) {
  <!-- Sortable table component -->
  <app-sortable-table [caption]="'Lists'" [columns]="columns">
    <ng-template #actionsTemplate let-row>
      <div class="govuk-button-group">
        <a class="govuk-button" [routerLink]="['/applications', row.id]"
          >Open</a
        >
        <button type="button" class="govuk-button govuk-button--secondary">
          Update
        </button>
      </div>
    </ng-template>
  </app-sortable-table>

  <!-- Pager -->
  <app-pagination
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (pageChange)="onPageChange($event)"
  ></app-pagination>
}
