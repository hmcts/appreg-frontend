<h1 class="govuk-heading-xl">Applications list</h1>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>
<form [formGroup]="form" (ngSubmit)="onSubmit($event)">
  <div class="govuk-grid-row">
    <!-- Date -->
    <app-date-input
      formControlName="date"
      label="Date"
      hint="For example, 27 3 2007"
      idPrefix="date"
    >
    </app-date-input>

    <!-- Time -->
    <app-duration-input
      formControlName="time"
      label="Time"
      hint="Enter the time in 24-hour format, for example 08:30"
      idPrefix="time"
    >
    </app-duration-input>

    <!-- Description -->
    <app-text-input
      formControlName="description"
      label="Description"
      hint="A description of the application list"
      idPrefix="description"
    >
    </app-text-input>

    <!-- Status -->
    <app-select-input
      formControlName="status"
      label="Select status"
      hint="The status of the application list"
      idPrefix="status"
      [options]="status"
    >
    </app-select-input>
  </div>

  <div class="govuk-grid-row">
    <!-- Court -->
    <app-text-input
      formControlName="court"
      label="Court"
      hint="A description of the court"
      idPrefix="court"
    >
    </app-text-input>

    <!-- Other location -->
    <app-text-input
      formControlName="location"
      label="Other location"
      hint="Other location description"
      idPrefix="location"
    >
    </app-text-input>

    <!-- CJA -->
    <app-text-input
      formControlName="cja"
      label="CJA"
      hint="Criminal justice area"
      idPrefix="cja"
    >
    </app-text-input>
  </div>

  <div class="govuk-button-group">
    <button type="submit" class="govuk-button" value="search">Search</button>
    <button
      type="submit"
      class="govuk-button govuk-button--secondary"
      value="create"
    >
      Create
    </button>
  </div>
</form>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>

<!-- Sortable table component -->
<app-sortable-table caption="Lists" [columns]="columns" [data]="rows">
  <ng-template #actionsTemplate let-row>
    <!-- inside your <ng-template #actionsTemplate let-row> -->
    <div class="govuk-button-group">
      <a [routerLink]="['/applications-list', row.id]" class="govuk-button"
        >Open</a
      >

      <button
        type="button"
        class="govuk-button govuk-button--warning"
        (click)="onDelete(row.id)"
      >
        Delete
      </button>

      <!-- actions slot -->
      <div
        class="moj-button-menu"
        data-module="moj-button-menu"
        data-button-text="Actions"
        data-button-classes="govuk-button--secondary"
      >
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          (click)="onPrint()"
        >
          Print page
        </button>

        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          (click)="onPrintContinuous()"
        >
          Print continuous
        </button>

        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          (click)="onResultSelected()"
        >
          Result
        </button>
      </div>
    </div>
  </ng-template>
</app-sortable-table>

<!-- Pager -->
<app-pagination
  [currentPage]="currentPage"
  [totalPages]="totalPages"
  (pageChange)="onPageChange($event)"
></app-pagination>
