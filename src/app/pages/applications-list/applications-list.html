<h1 class="govuk-heading-xl">Applications list</h1>

<!-- SUCCESS BANNER -->
<div
  *ngIf="successBanner"
  class="govuk-notification-banner govuk-notification-banner--success"
  role="alert"
  aria-labelledby="govuk-notification-banner-title"
  data-module="govuk-notification-banner"
  tabindex="-1"
  #successBannerEl
>
  <div class="govuk-notification-banner__header">
    <h2 class="govuk-notification-banner__title" id="govuk-notification-banner-title">
      Success
    </h2>
  </div>
  <div class="govuk-notification-banner__content">
    <h3 class="govuk-notification-banner__heading">
      {{ successBanner.heading }}
    </h3>
    <p *ngIf="successBanner.body || successBanner.link" class="govuk-body">
      {{ successBanner.body }}
      <a
        *ngIf="successBanner.link"
        class="govuk-notification-banner__link"
        [href]="successBanner.link.href"
      >
        {{ successBanner.link.text }}
      </a>
    </p>
  </div>
</div>

<!-- ERROR SUMMARY -->
<div
  *ngIf="errorSummary?.length"
  class="govuk-error-summary"
  data-module="govuk-error-summary"
  role="alert"
  aria-labelledby="error-summary-title"
  tabindex="-1"
  #errorSummaryEl
>
  <h2 class="govuk-error-summary__title" id="error-summary-title">
    There is a problem
  </h2>
  <div class="govuk-error-summary__body">
    <ul class="govuk-list govuk-error-summary__list">
      <li *ngFor="let err of errorSummary">
        <a *ngIf="err.href; else plain" [href]="err.href">{{ err.text }}</a>
        <ng-template #plain>{{ err.text }}</ng-template>
      </li>
    </ul>
  </div>
</div>


<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>
<form [formGroup]="form" (ngSubmit)="onSubmit($event)">
  <div class="govuk-grid-row">
    <!-- Date -->
    <app-date-input
      formControlName="date"
      label="Date"
      hint="For example, 27 3 2007"
      idPrefix="date"
    >
    </app-date-input>

    <!-- Time -->
    <app-duration-input
      formControlName="time"
      label="Time"
      hint="Enter the time in 24-hour format, for example 08:30"
      idPrefix="time"
    >
    </app-duration-input>

    <!-- Description -->
    <app-text-input
      formControlName="description"
      label="Description"
      hint="A description of the application list"
      idPrefix="description"
    >
    </app-text-input>

    <!-- Status -->
    <app-select-input
      formControlName="status"
      label="Select status"
      hint="The status of the application list"
      idPrefix="status"
      [options]="status"
    >
    </app-select-input>
  </div>

  <div class="govuk-grid-row">
    <!-- Court -->
    <app-text-input
      formControlName="court"
      label="Court"
      hint="A description of the court"
      idPrefix="court"
    >
    </app-text-input>

    <!-- Other location -->
    <app-text-input
      formControlName="location"
      label="Other location"
      hint="Other location description"
      idPrefix="location"
    >
    </app-text-input>

    <!-- CJA -->
    <app-text-input
      formControlName="cja"
      label="CJA"
      hint="Criminal justice area"
      idPrefix="cja"
    >
    </app-text-input>
  </div>

  <div class="govuk-button-group">
    <button type="submit" class="govuk-button" value="search">Search</button>
    <button
      type="submit"
      class="govuk-button govuk-button--secondary"
      value="create"
    >
      Create
    </button>
  </div>
</form>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>

<!-- Sortable table component -->
<app-sortable-table caption="Lists" [columns]="columns" [data]="rows">
  <ng-template #actionsTemplate let-row>
    <div class="govuk-button-group">
      <!-- actions slot -->
      <div
        class="moj-button-menu"
        data-module="moj-button-menu"
        data-button-text="Select"
        data-button-classes="govuk-button"
      >
        <!-- Open button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          [routerLink]="['/applications-list', row.id]"
        >
          Open
        </button>

        <!-- Print page button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          (click)="onPrint()"
        >
          Print page
        </button>

        <!-- Print continuous button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          (click)="onPrintContinuous()"
        >
          Print continuous
        </button>

        <!-- Result button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          [routerLink]="['/result-selected', row.id]"
        >
          Result
        </button>

        <!-- Delete button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--warning"
          (click)="onDelete(row)"
        >
          Delete
        </button>
      </div>
    </div>
  </ng-template>
</app-sortable-table>

<!-- Pager -->
<app-pagination
  [currentPage]="currentPage"
  [totalPages]="totalPages"
  (pageChange)="onPageChange($event)"
></app-pagination>
