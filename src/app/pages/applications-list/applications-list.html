<div
  class="govuk-!-margin-bottom-4"
  style="
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  "
>
  <h1 class="govuk-heading-xl govuk-!-margin-bottom-0">Applications list</h1>

  <a
    [routerLink]="['/applications-list-create']"
    role="button"
    draggable="false"
    class="govuk-button govuk-button--start govuk-!-margin-bottom-0"
    data-module="govuk-button"
  >
    Create a new list
    <svg
      class="govuk-button__start-icon"
      xmlns="http://www.w3.org/2000/svg"
      width="17.5"
      height="19"
      viewBox="0 0 33 40"
      aria-hidden="true"
      focusable="false"
    >
      <path fill="currentColor" d="M0 0h13l20 20-20 20H0l20-20z" />
    </svg>
  </a>
</div>

<!-- Error Summary -->
@if (createInvalid || anyInvalid) {
  <div class="govuk-error-summary" data-module="govuk-error-summary">
    <div role="alert">
      <h2 class="govuk-error-summary__title">{{ errorHint }}</h2>
      <div class="govuk-error-summary__body">
        <ul class="govuk-list govuk-error-summary__list">
          @if (createInvalid) {
            @for (c of unpopField; track c) {
              <li>{{ c }}</li>
            }
          }

          @if (anyInvalid) {
            @for (c of offendingFields; track c) {
              <li>{{ c }}</li>
            }
          }
        </ul>
      </div>
    </div>
  </div>
}

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>
<form [formGroup]="form" (ngSubmit)="onSubmit($event)" autocomplete="off">
  <div class="govuk-grid-row">
    <!-- Date -->
    <app-date-input
      formControlName="date"
      label="Date"
      hint="For example, 27 3 2007"
      idPrefix="date"
    >
    </app-date-input>

    <!-- Time -->
    <app-duration-input
      formControlName="time"
      label="Time"
      hint="Enter the time in 24-hour format, for example 08:30"
      idPrefix="time"
    >
    </app-duration-input>

    <!-- Description -->
    <app-text-input
      formControlName="description"
      label="Description"
      hint="A description of the application list"
      idPrefix="description"
    >
    </app-text-input>

    <!-- Status -->
    <app-select-input
      formControlName="status"
      label="Select status"
      hint="The status of the application list"
      idPrefix="status"
      [options]="status"
    >
    </app-select-input>
  </div>

  <div class="govuk-grid-row">
    <!-- Court -->
    <app-text-input
      formControlName="court"
      label="Court"
      hint="Start typing to filter courts"
      idPrefix="court"
      [listId]="'court-list'"
      [suggestions]="courtLocationOptions"
    >
      >
    </app-text-input>

    <!-- Other location -->
    <app-text-input
      formControlName="location"
      label="Other location"
      hint="Other location description"
      idPrefix="location"
    >
    </app-text-input>

    <!-- CJA -->
    <app-text-input
      formControlName="cja"
      label="CJA"
      hint="Criminal justice area"
      idPrefix="cja"
      [listId]="'cja-list'"
      [suggestions]="cjaOptions"
    >
      >
    </app-text-input>
  </div>

  <div class="govuk-button-group">
    <button type="submit" class="govuk-button" value="search">Search</button>
  </div>
</form>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>

<!-- Sortable table component -->
<app-sortable-table caption="Lists" [columns]="columns">
  <!-- actions slot -->
  <ng-template #actionsTemplate let-row>
    <div class="govuk-button-group">
      <a
        [routerLink]="['/applications-list', row.id]"
        class="govuk-button govuk-button--secondary"
      >
        Open
      </a>
      <button
        type="button"
        class="govuk-button govuk-button--warning"
        (click)="onDelete(row.id)"
      >
        Delete
      </button>
    </div>
  </ng-template>
</app-sortable-table>

<!-- Pager -->
<app-pagination
  [currentPage]="currentPage"
  [totalPages]="totalPages"
  (pageChange)="onPageChange($event)"
></app-pagination>
