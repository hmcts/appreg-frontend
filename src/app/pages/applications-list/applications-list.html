<div class="moj-page-header-actions">
  <div class="moj-page-header-actions__title">
    <h1 class="govuk-heading-xl">Applications List</h1>
  </div>
  <div class="moj-page-header-actions__actions">
    <div class="moj-button-group moj-button-group--inline">
      <a
        class="govuk-button"
        data-module="govuk-button"
        routerLink="/applications-list/create"
      >
        Create a new list
      </a>
    </div>
  </div>
</div>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>
<form [formGroup]="form" (ngSubmit)="onSubmit($event)">
  <div class="govuk-grid-row">
    <!-- Date -->
    <app-date-input
      formControlName="date"
      label="Date"
      hint="For example, 27 3 2007"
      idPrefix="date"
      [submitted]="submitted"
      [isSearch]="isSearch"
    >
    </app-date-input>

    <!-- Time -->
    <app-duration-input
      formControlName="time"
      label="Time"
      hint="Enter the time in 24-hour format, for example 08:30"
      idPrefix="time"
      [submitted]="submitted"
      [required]="!isSearch"
    >
    </app-duration-input>

    <!-- Description -->
    <app-text-input
      formControlName="description"
      label="Description"
      hint="A description of the application list"
      idPrefix="description"
    >
    </app-text-input>

    <!-- Status -->
    <app-select-input
      formControlName="status"
      label="Select status"
      hint="The status of the application list"
      idPrefix="status"
      [options]="status"
    >
    </app-select-input>
  </div>

  <div class="govuk-grid-row">
    <!-- Court -->
    <app-suggestions
      id="court"
      label="Court"
      hint="Start typing to search"
      [(search)]="courthouseSearch"
      (searchChange)="onCourthouseInputChange()"
      [suggestions]="filteredCourthouses"
      (selectItem)="selectCourthouse($event)"
      [disabled]="!!form.get('location')?.value || !!form.get('cja')?.value"
    />

    <!-- Other location -->
    <app-text-input
      formControlName="location"
      label="Other location"
      hint="Other location description"
      idPrefix="location"
      [disabled]="!!form.get('court')?.value"
    >
    </app-text-input>

    <!-- CJA -->
    <app-suggestions
      id="cja"
      label="CJA"
      hint="Start typing to search"
      [(search)]="cjaSearch"
      (searchChange)="onCjaInputChange()"
      [suggestions]="filteredCja"
      (selectItem)="selectCja($event)"
      [disabled]="!!courthouseSearch.trim() || !!form.get('court')?.value"
    />
  </div>

  <div class="govuk-button-group">
    <button type="submit" class="govuk-button" value="search">Search</button>
  </div>
</form>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>

<!-- Sortable table component -->
<app-sortable-table [caption]="caption" [columns]="columns" [data]="rows">
  <ng-template #actionsTemplate let-row>
    <div class="govuk-button-group">
      <!-- actions slot -->
      <div
        class="moj-button-menu"
        data-module="moj-button-menu"
        data-button-text="Select"
        data-button-classes="govuk-button"
      >
        <!-- Open button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          [routerLink]="['/applications-list', row.id]"
        >
          Open
        </button>

        <!-- Print page button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          (click)="onPrint()"
        >
          Print page
        </button>

        <!-- Print continuous button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          (click)="onPrintContinuous()"
        >
          Print continuous
        </button>

        <!-- Result button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--secondary"
          [routerLink]="['/result-selected', row.id]"
        >
          Result
        </button>

        <!-- Delete button -->
        <button
          type="button"
          class="govuk-button moj-button-menu__item govuk-button--warning"
          (click)="onDelete(row.id)"
        >
          Delete
        </button>
      </div>
    </div>
  </ng-template>
</app-sortable-table>

<!-- Pager -->
<app-pagination
  [currentPage]="currentPage"
  [totalPages]="totalPages"
  (pageChange)="onPageChange($event)"
></app-pagination>
