<app-breadcrumbs
  [items]="[
    { label: 'Applications list', link: '/applications-list' },
    { label: 'Applications list details', link: '/applications-list/' + appListId }
  ]"
/>

<h1 class="govuk-heading-xl">Applications list entry update</h1>

<form [formGroup]="form">
  <ng-template #applicantTpl>
    <h3 class="govuk-heading-m">Application entry type</h3>
    <div class="govuk-grid-row">
      <app-select-input
        formControlName="entryType"
        label="Select type"
        hint="The type of applicant for this application"
        idPrefix="application-entry-type"
        [options]="entryTypeOptions"
      ></app-select-input>
    </div>

    <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible"/>

    @switch (form.get('entryType')?.value) {
      @case ('Person') {
        <app-person-section
          [group]="personGroup"
          [titleOptions]="personTitleOptions">
        </app-person-section>
      }
      @case ('Organisation') {
        <app-organisation-section
          [group]="organisationGroup">
        </app-organisation-section>
      }
      @case ('Standard Applicant') {
        <app-sortable-table
          id="sortable-table"
          caption="Lists"
          [columns]="applicantColumns"
          appMojButtonMenu
        >
        </app-sortable-table>
      }
    }
  </ng-template>

  <ng-template #codesTpl>
    <div class="govuk-grid-row">
      <!-- Lodgement date -->
      <app-date-input
        formControlName="lodgementDate"
        label="Lodgement date"
        hint="For example, 27 3 2007"
        idPrefix="lodgement-date"
        [submitted]="formSubmitted"
        [isSearch]="true"
      >
      </app-date-input>

      <!-- Application code -->
      <app-text-input
        formControlName="applicationCode"
        label="Application code"
        hint="The code for the application e.g. APP-12345"
        idPrefix="application-code"
      >
      </app-text-input>

      <!-- Application title -->
      <app-text-input
        formControlName="applicationTitle"
        label="Application title"
        hint="Enter a concise title for this application"
        idPrefix="application-title"
      >
      </app-text-input>
    </div>

    <div class="govuk-button-group">
      <button type="button" class="govuk-button" (click)="onCodesSearch()">Search</button>
    </div>

    <hr class="govuk-section-break govuk-section-break--m govuk-section-break--visible" />

    <app-sortable-table
      id="codes-table"
      caption="Codes"
      [columns]="codesColumns"
      appMojButtonMenu
    >
      <ng-template #actionsTemplate let-row>
        <div class="govuk-button-group">
          <button type="button" class="govuk-button">Add code</button>
          <button type="button" class="govuk-button govuk-button--secondary">Add wording</button>
        </div>
      </ng-template>
    </app-sortable-table>
  </ng-template>

  <ng-template #wordingTpl>
    <div class="govuk-grid-row">
      <!-- Court name -->
      <app-text-input
        formControlName="courtName"
        label="Court name"
        hint="Enter the official name of the court"
        idPrefix="court-name">
      </app-text-input>

      <!-- Organisation name -->
      <app-text-input
        formControlName="organisationName"
        label="Organisation name"
        hint="Enter the legal name of the organisation"
        idPrefix="organisation-name">
      </app-text-input>
    </div>
  </ng-template>


  <ng-template #respondentTpl>
  </ng-template>

  <ng-template #civilFeeTpl>
  </ng-template>

  <ng-template #notesTpl>
  </ng-template>

  <ng-template #resultWordingTpl>
  </ng-template>

  <ng-template #officialsTpl>
  </ng-template>

  <app-accordion
    [id]="'accordion-default'"
    [items]="[
      { heading: 'Applicant', tpl: applicantTpl, expanded: false },
      { heading: 'Codes', tpl: codesTpl, expanded: false },
      { heading: 'Wording', tpl: wordingTpl, expanded: false },
      { heading: 'Respondent', tpl: respondentTpl, expanded: false },
      { heading: 'Civil fee', tpl: civilFeeTpl, expanded: false },
      { heading: 'Notes', tpl: notesTpl, expanded: false },
      { heading: 'Result wording', tpl: resultWordingTpl, expanded: false },
      { heading: 'Officials', tpl: officialsTpl, expanded: false }
    ]">
  </app-accordion>
</form>
