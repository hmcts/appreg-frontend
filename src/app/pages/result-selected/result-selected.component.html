<!-- Breadcrumbs -->
<app-breadcrumbs
  [items]="[
    { label: 'Applications list', link: '/applications-list' },
    {
      label: 'Applications list details',
      link: '/applications-list/' + listId,
    },
  ]"
></app-breadcrumbs>

@if (resultCodeApplySuccess()) {
  <app-success-banner heading="Result codes applied successfully" />
}

@if (errorSummaryItems().length > 0) {
  <app-error-summary
    [title]="'There is a problem'"
    [items]="errorSummaryItems()"
    targetId="results-applicant-table"
  />
}

<h1 class="govuk-heading-xl">Result applications</h1>

@if (mixedResultedAndUnresultedApplications) {
  <app-warning-banner
    [message]="'Resulted applications are hidden. Only applications without a result (No) are selected for processing.'"
  />
}

<app-result-wording-section
  [resultApplicantContext]="rows"
  [existingResults]="[]"
  [applicantRespondentColumns]="columns"
  [captionSize]="'m'"
  [caption]="'Application(s) to result'"
  [buttonText]="'Save changes'"
  [resultCodesList]="resultsFacade.resultCodesSignal()"
  [clearPendingToken]="resultsFacade.clearPendingToken()"
  [wordingByCode]="resultsFacade.resultCodeWordingByCode()"
  [resultCodeTemplateByCode]="resultsFacade.resultCodeTemplateByCode()"
  (pendingChange)="onPendingChange($event)"
  (submitResults)="onSubmitResults($event)"
/>
