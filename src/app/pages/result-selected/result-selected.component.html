<!-- Breadcrumbs -->
<app-breadcrumbs
  [items]="[
    { label: 'Applications list', link: '/applications-list' },
    {
      label: 'Applications list details',
      link: '/applications-list/' + listId,
    },
  ]"
></app-breadcrumbs>

<h1 class="govuk-heading-xl">Result applications</h1>

@if (mixedResultedAndUnresultedApplications) {
  <app-warning-banner
    [message]="'Resulted applications are hidden. Only applications without a result (No) are selected for processing.'"
  />
}

<!-- Table of applications to result -->
<app-table
  [caption]="'Applications to result'"
  [columns]="columns"
  [rows]="rows"
>
</app-table>

<!-- Search box to filter result codes -->
<app-search-box
  [label]="'Search for a result code'"
  [hint]="'Start typing to see results'"
  buttonText="Save"
  placeholder="e.g. APPC"
  (valueChange)="onSearchChange()"
  (submitted)="onSearchSubmit()"
>
</app-search-box>
