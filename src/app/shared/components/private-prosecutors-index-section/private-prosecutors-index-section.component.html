<h1 class="govuk-heading-l">Private prosecutors index</h1>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>

<!-- Bind this sub-form to the nested FormGroup provided by the parent -->
<app-reports-shared-form
  [group]="group()"
  [suggestions]="suggestions()"
  [submitted]="submitted()"
  [getError]="getError()"
  [advancedFilters]="true"
  [courtInAdvancedFilters]="true"
>
  <div reportsAfterDateBeforeCourt [formGroup]="group()">
    <!-- Applicant organisation -->
    <div class="govuk-grid-row">
      <app-text-input
        formControlName="applicantOrg"
        label="Applicant organisation name"
        idPrefix="ppi-applicant-org"
        containerWidthClass="govuk-grid-column-one-quarter"
        widthClass="govuk-!-width-full"
      />
    </div>

    <!-- Applicant first/last name -->
    <div class="govuk-grid-row">
      <app-text-input
        formControlName="applicantFirst"
        label="Applicant first name"
        idPrefix="ppi-applicant-first"
        containerWidthClass="govuk-grid-column-one-quarter"
        widthClass="govuk-!-width-full"
      />

      <app-text-input
        formControlName="applicantLast"
        label="Applicant last name"
        idPrefix="ppi-applicant-last"
        containerWidthClass="govuk-grid-column-one-quarter"
        widthClass="govuk-!-width-full"
      />
    </div>
  </div>

  <div reportsAdvancedFieldsBeforeLocation [formGroup]="group()">
    <!-- Standard applicant name -->
    <div class="govuk-grid-row">
      <app-text-input
        formControlName="standardApplicantName"
        label="Standard applicant name"
        idPrefix="ppi-standard-applicant"
        containerWidthClass="govuk-grid-column-one-quarter"
        widthClass="govuk-!-width-full"
      />
    </div>
    <!-- Respondent first name -->
    <div class="govuk-grid-row">
      <app-text-input
        formControlName="respondentFirst"
        label="Respondent first name"
        idPrefix="ppi-respondent-first"
        containerWidthClass="govuk-grid-column-one-quarter"
        widthClass="govuk-!-width-full"
      />
    </div>
    <!-- Respondent surname -->
    <div class="govuk-grid-row">
      <app-text-input
        formControlName="respondentSurname"
        label="Respondent surname"
        idPrefix="ppi-respondent-surname"
        containerWidthClass="govuk-grid-column-one-quarter"
        widthClass="govuk-!-width-full"
      />
    </div>
    <!-- Respondent organisation -->
    <div class="govuk-grid-row">
      <app-text-input
        formControlName="respondentOrg"
        label="Respondent organisation"
        idPrefix="ppi-respondent-org"
        containerWidthClass="govuk-grid-column-one-quarter"
        widthClass="govuk-!-width-full"
      />
    </div>
  </div>
</app-reports-shared-form>
