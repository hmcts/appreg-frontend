<app-sortable-table
  id="results-applicant-table"
  [caption]="caption()"
  [captionSize]="captionSize()"
  [columns]="applicantRespondentColumns()"
  [data]="resultApplicantContext()"
  appMojButtonMenu
/>

<div class="govuk-grid-row">
  <app-suggestions
    id="result-code"
    label="Result code"
    hint="Start typing to search for a result code"
    [(search)]="resultCodeSearch"
    [suggestions]="filteredResultCodes"
    [getItemLabel]="resultCodeLabel"
    (selectItem)="selectResultCode($event)"
    [widthClass]="'govuk-!-width-one-half'"
    [containerWidthClass]="'govuk-grid-column-one-half'"
  />
</div>

<app-summary-list-card-action
  [summaryLists]="existingResultSummaryLists()"
  (onClick)="onSummaryActionClick($event)"
  [cardBodyTemplate]="resultCardBody"
/>

<ng-template #resultCardBody let-card>
  @if (getTemplateForCard(card); as template) {
    <app-wording-parser
      [wordingObject]="template"
      [wordingObjectValues]="getWordingValuesForCard(card)"
      (wordingFieldsDTO)="onCardWordingFieldsDTO(card, $event)"
      (wordingFieldErrors)="onCardWordingFieldErrors(card, $event)"
      [wordingSubmitAttempt]="wordingSubmitAttempt()"
      [showSaveButton]="false"
      section="result wording"
    />
  }
</ng-template>

<div class="govuk-button-group">
  <button
    type="button"
    class="govuk-button"
    (click)="onSaveResult()"
    [disabled]="!canSubmitResults()"
  >
    {{ buttonText() }}
  </button>
</div>
