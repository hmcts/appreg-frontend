<app-help-details summary="Help with result wording">
  <p class="govuk-body">
    Result wording is based on the selected result code and may include fixed
    text and fields you need to complete.
  </p>

  <p class="govuk-body">Fixed wording cannot be edited on this page.</p>
</app-help-details>

@if (showAppliedBanner()) {
  <app-alert
    alertType="success"
    message="Results applied to this entry. Save the entry to keep these changes."
    [allowDismiss]="true"
    (alertDismissed)="onAppliedBannerDismissed()"
    id="results-local-banner"
  />
}

<app-sortable-table
  id="results-applicant-table"
  [caption]="caption()"
  [captionSize]="captionSize()"
  [columns]="applicantRespondentColumns()"
  [data]="resultApplicantContext()"
  [clientOrServerSort]="'server'"
  [sortState]="sortState()"
  (sortChange)="sortChange.emit($event)"
>
  <ng-template #dateTemplate let-row>
    {{ row.date | dateTime }}
  </ng-template>
</app-sortable-table>

@if (totalPages() > 1) {
  <app-pagination
    [currentPage]="currentPage()"
    [totalPages]="totalPages()"
    (pageChange)="pageChange.emit($event)"
  />
}

<div class="govuk-grid-row govuk-!-margin-top-8">
  <app-suggestions
    id="result-code"
    label="Result code"
    hint="Start typing to search for a result code"
    [(search)]="resultCodeSearch"
    [suggestions]="filteredResultCodes"
    (selectItem)="onResultCodeSuggestionSelected($event)"
    [widthClass]="'govuk-!-width-one-half'"
    [containerWidthClass]="'govuk-grid-column-one-half'"
  />
</div>

<app-summary-list-card-action
  [summaryLists]="existingResultSummaryLists()"
  (onClick)="onSummaryActionClick($event)"
  [cardBodyTemplate]="resultCardBody"
/>

<ng-template #resultCardBody let-card>
  @if (getTemplateForCard(card); as template) {
    <app-wording-parser
      [wordingObject]="template"
      [wordingObjectValues]="getInitialWordingValuesForCard(card)"
      (wordingFieldsDTO)="onCardWordingFieldsDTO(card, $event)"
      (wordingFieldErrors)="onCardWordingFieldErrors(card, $event)"
      [wordingSubmitAttempt]="wordingSubmitAttempt()"
      [showSaveButton]="false"
      section="result wording"
    />
  }
</ng-template>

<div class="govuk-button-group">
  <button
    type="button"
    class="govuk-button"
    (click)="onSaveResult()"
    [disabled]="submitting() || !canSubmitResults()"
  >
    {{ buttonText() }}
  </button>
</div>
