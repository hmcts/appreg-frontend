@if (saveSuccessful()) {
  <app-alert
    alertType="success"
    message="Successfully saved wording"
    [allowDismiss]="true"
  />
}

<app-wording-parser
  [wordingObject]="wordingObject()"
  [wordingObjectValues]="wordingObjectValues()"
  [wordingSubmitAttempt]="wordingSubmitAttempt()"
  (wordingFieldsDTO)="onWordingFieldsDTO($event)"
  (wordingFieldErrors)="onWordingFieldErrors($event)"
/>
