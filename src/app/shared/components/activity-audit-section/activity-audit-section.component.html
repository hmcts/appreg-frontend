<h1 class="govuk-heading-l">Activity audit</h1>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>

<!-- Bind this sub-form to the group passed in from the parent -->
<div [formGroup]="group()">
  <!-- Date from -->
  <div class="govuk-grid-row">
    <app-date-input
      formControlName="dateFrom"
      label="Date from"
      hint="For example, 27 3 2007"
      idPrefix="date-from"
      [submitted]="submitted()"
    />
  </div>

  <!-- Date to -->
  <div class="govuk-grid-row">
    <app-date-input
      formControlName="dateTo"
      label="Date to"
      hint="For example, 27 3 2007"
      idPrefix="date-to"
      [submitted]="submitted()"
    />
  </div>
  <!-- Username -->
  <div class="govuk-grid-row">
    <app-text-input
      formControlName="username"
      label="Username"
      hint="Type the exact username you wish to audit"
      idPrefix="username"
      containerWidthClass="govuk-grid-column-one-quarter"
      widthClass="govuk-!-width-full"
    />
  </div>
  <!-- Activity -->
  <div class="govuk-grid-row">
    <app-text-input
      formControlName="activity"
      label="Activity"
      hint="Show activity regarding the creation"
      idPrefix="activity"
      containerWidthClass="govuk-grid-column-one-half"
      widthClass="govuk-!-width-full"
    />
  </div>
</div>
