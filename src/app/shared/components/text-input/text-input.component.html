<div class="govuk-grid-column-one-quarter">
  <div
    class="govuk-form-group"
    [ngClass]="{
      'govuk-form-group--error': submitted && !value?.toString()?.trim(),
    }"
  >
    @if (label) {
      <div class="govuk-label-wrapper">
        <label class="govuk-label govuk-label--m" [for]="idPrefix">
          {{ label }}
        </label>
      </div>
    }

    @if (hint) {
      <div [id]="idPrefix + '-hint'" class="govuk-hint">
        {{ hint }}
      </div>
    }

    @if (submitted && !value?.toString()?.trim()) {
      <p [id]="idPrefix + '-error'" class="govuk-error-message">
        <span class="govuk-visually-hidden">Error:</span>
        {{ label || 'This field' }} is required
      </p>
    }

    <input
      class="govuk-input"
      [ngClass]="[
        widthClass,
        submitted && !value?.toString()?.trim() ? 'govuk-input--error' : '',
      ]"
      [id]="idPrefix"
      [name]="idPrefix"
      type="text"
      [attr.aria-describedby]="
        (
          (hint ? idPrefix + '-hint' : '') +
          ' ' +
          (submitted && !value?.toString()?.trim() ? idPrefix + '-error' : '')
        ).trim()
      "
      [value]="value"
      (input)="onInput($event)"
      [disabled]="disabled"
      [attr.list]="listId || null"
    />

    @if (listId) {
      <datalist [id]="listId">
        @for (s of suggestions; track s?.value ?? s) {
          <option [value]="s?.value ?? s">{{ s?.label ?? s }}</option>
        }
      </datalist>
    }
  </div>
</div>
