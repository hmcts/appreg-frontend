<h1 class="govuk-heading-l">Fees</h1>

<hr
  class="govuk-section-break govuk-section-break--m govuk-section-break--visible"
/>

<!-- Bind the sub-form -->
<app-reports-shared-form
  [group]="group()"
  [suggestions]="suggestions()"
  [submitted]="submitted()"
  [getError]="getError()"
/>

<div [formGroup]="group()">
  <div class="govuk-grid-row">
    <app-text-input
      formControlName="applicantCode"
      label="Applicant code"
      id="applicant-code"
    />
  </div>

  <div class="govuk-grid-row">
    <app-text-input
      formControlName="surnameOrOrg"
      label="Surname or organisation"
      id="surname-or-org"
      containerWidthClass="govuk-grid-column-one-half"
      widthClass="govuk-!-width-full"
    />
  </div>
</div>
