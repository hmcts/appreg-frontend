<h1 class="govuk-heading-l">Change payment reference</h1>
<div class="govuk-grid-row">
  <div class="govuk-grid-column-one-third">
    <dl class="govuk-summary-list govuk-!-margin-bottom-6">
      <div class="govuk-summary-list__row">
        <dt class="govuk-summary-list__key">Status</dt>
        <dd class="govuk-summary-list__value">{{ row?.['paymentStatus'] }}</dd>
      </div>
      <div class="govuk-summary-list__row">
        <dt class="govuk-summary-list__key">Status date</dt>
        <dd class="govuk-summary-list__value">
          {{ statusDateRaw | dateTime }}
        </dd>
      </div>
    </dl>

    <div
      class="govuk-form-group"
      [class.govuk-form-group--error]="isPaymentReferenceInvalid()"
    >
      <label class="govuk-label" for="paymentReference"
        >Payment reference</label
      >
      @if (isPaymentReferenceInvalid()) {
        <p id="paymentReference-error" class="govuk-error-message">
          <span class="govuk-visually-hidden">Error:</span>
          {{ getPaymentReferenceError() }}
        </p>
      }
      <input
        id="paymentReference"
        class="govuk-input"
        [class.govuk-input--error]="isPaymentReferenceInvalid()"
        [formControl]="paymentReference"
        [attr.aria-describedby]="
          isPaymentReferenceInvalid() ? 'paymentReference-error' : null
        "
        autocomplete="off"
      />
    </div>

    <div class="govuk-button-group">
      <button class="govuk-button" type="button" (click)="save()">Save</button>
      <button
        class="govuk-button govuk-button--secondary"
        type="button"
        (click)="cancel()"
      >
        Cancel
      </button>
    </div>
  </div>
</div>
