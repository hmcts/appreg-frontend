nodejs:
  # Don't modify below here
  image: ${IMAGE_NAME}
  ingressHost: ${SERVICE_FQDN}
  keyVaults:
    appreg:
      secrets:
        - name: app-insights-connection-string
          alias: app-insights-connection-string-fe
        - name: azure-tenant-id
          alias: azure-tenant-id-fe
        - name: azure-client-secret
          alias: azure-client-secret-fe
        - name: azure-app-id
          alias: azure-app-id-fe
        - name: AppInsightsInstrumentationKey
          alias: APP_INSIGHTS_INSTRUMENTATION_KEY
  environment:
    NODE_ENV: 'production'
    CONFIG_DEBUG: 'true'
    AUTH_REDIRECT_URI: https://${SERVICE_FQDN}/sso/login-callback
    AUTH_POST_LOGOUT_REDIRECT_URI: https://${SERVICE_FQDN}/login
    AUTH_SCOPES: '["openid","profile","email","offline_access"]'
    API_BASE_URL: http://localhost:4550
    API_SCOPES: '["api://dummyTenantId/frontend"]'
    SESSION_COOKIE_NAME: appreg.sid
    SESSION_SECURE: 'true'
