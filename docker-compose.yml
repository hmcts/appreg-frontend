services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: appreg-frontend:latest
    container_name: appreg-frontend
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - '4000:4000'
    restart: unless-stopped

  wiremock:
    image: wiremock/wiremock:latest
    container_name: appreg-wiremock
    command: ['--verbose']
    ports:
      - '4550:8080'
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    restart: unless-stopped
