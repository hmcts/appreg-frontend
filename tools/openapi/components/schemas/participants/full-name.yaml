type: object
description: A persons full name.
required:
  - surname
  - firstForename

properties:

  title:
    type: string
    description: Prefix before a persons name.
    example: "Mr, Mrs"
    maxLength: 100

  surname:
    type: string
    description: The persons family name.
    example: "Smith"
    maxLength: 100

  firstForename:
    type: string
    description: The persons first name.
    example: "John"
    maxLength: 100

  secondForename:
    type: string
    description: The persons optional second name.
    maxLength: 100

  thirdForename:
    type: string
    description: The persons optional third name.
    maxLength: 100
